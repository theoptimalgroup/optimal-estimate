name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_STAGING }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME_STAGING }}
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  IMAGE_NAME: estimate-backend

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Alembic dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: ./scripts/deploy-migrate.sh

  deploy-backend-staging:
    runs-on: ubuntu-latest
    needs: migrate-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image
        run: |
          az acr login --name "${AZURE_CONTAINER_REGISTRY}"
          docker build -t "${AZURE_CONTAINER_REGISTRY}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}" ./backend
          docker push "${AZURE_CONTAINER_REGISTRY}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-frontend-staging:
    runs-on: ubuntu-latest
    needs: deploy-backend-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Render Static Web Apps config
        run: ./scripts/render-swa-config.sh "${{ vars.STAGING_API_URL }}"
        working-directory: frontend

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          api_location: ""
          output_location: .next
          app_build_command: npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL }}
