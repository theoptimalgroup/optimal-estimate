services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: estimate
      POSTGRES_PASSWORD: estimate_dev
      POSTGRES_DB: estimate_tool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estimate -d estimate_tool"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://estimate:estimate_dev@postgres:5432/estimate_tool
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-dev}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - pdf_storage:/app/storage/pdfs
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-dev}
        NEXT_PUBLIC_AZURE_TENANT_ID: ${NEXT_PUBLIC_AZURE_TENANT_ID:-}
        NEXT_PUBLIC_AZURE_CLIENT_ID: ${NEXT_PUBLIC_AZURE_CLIENT_ID:-}
        NEXT_PUBLIC_AZURE_API_SCOPE: ${NEXT_PUBLIC_AZURE_API_SCOPE:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  pdf_storage:
